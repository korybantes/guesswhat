services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: guesswhat

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: guesswhat
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HOST: 0.0.0.0
      PORT: "8080"
      RUST_LOG: info
    depends_on:
      - mongo

volumes:
  mongo_data:
